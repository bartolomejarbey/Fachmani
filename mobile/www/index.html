<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Fachmani</title>
  <style>
    html,body{margin:0;height:100%;background:#ffffff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:env(safe-area-inset-top) 24px env(safe-area-inset-bottom)}
    .logo{font-size:34px;font-weight:800;background:linear-gradient(90deg,#06b6d4,#3b82f6);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-0.5px}
    .spinner{width:34px;height:34px;border:3px solid #e2e8f0;border-top-color:#06b6d4;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sub{color:#64748b;font-size:14px}
    .hidden{display:none}
    .offline{max-width:340px;text-align:center}
    .offline h1{font-size:20px;color:#0f172a;margin:0 0 8px}
    .offline p{color:#475569;font-size:14px;line-height:1.5;margin:0 0 20px}
    .btn{display:inline-block;background:linear-gradient(90deg,#06b6d4,#3b82f6);color:#fff;border:none;font-size:16px;font-weight:600;padding:13px 28px;border-radius:14px}
    .emoji{font-size:44px}
  </style>
</head>
<body>
  <div class="wrap" id="loading">
    <div class="logo">Fachmani</div>
    <div class="spinner"></div>
    <div class="sub">Načítání…</div>
  </div>

  <div class="wrap hidden" id="offline">
    <div class="offline">
      <div class="emoji">📡</div>
      <h1>Nejste připojeni k internetu</h1>
      <p>Pro používání aplikace Fachmani je potřeba připojení k internetu. Zkontrolujte prosím Wi-Fi nebo mobilní data a zkuste to znovu.</p>
      <button class="btn" onclick="tryLoad()">Zkusit znovu</button>
    </div>
  </div>

  <script>
    var TARGET = 'https://fachmani.org';
    function show(id){
      document.getElementById('loading').classList.toggle('hidden', id!=='loading');
      document.getElementById('offline').classList.toggle('hidden', id!=='offline');
    }
    function tryLoad(){
      show('loading');
      if (navigator.onLine === false){ show('offline'); return; }
      // ping fachmani.org; pokud OK, načti web, jinak offline obrazovka
      var done=false;
      var t=setTimeout(function(){ if(!done){ done=true; show('offline'); } }, 6000);
      fetch(TARGET + '/manifest.webmanifest', {method:'HEAD', cache:'no-store'})
        .then(function(){ if(done) return; done=true; clearTimeout(t); location.replace(TARGET); })
        .catch(function(){
          // i bez manifestu zkus jednoduchý reachability test
          fetch(TARGET, {method:'HEAD', mode:'no-cors', cache:'no-store'})
            .then(function(){ if(done) return; done=true; clearTimeout(t); location.replace(TARGET); })
            .catch(function(){ if(done) return; done=true; clearTimeout(t); show('offline'); });
        });
    }
    window.addEventListener('online', function(){ if(!document.getElementById('offline').classList.contains('hidden')) tryLoad(); });
    tryLoad();
  </script>
</body>
</html>
